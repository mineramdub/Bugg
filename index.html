<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Bugg — Le bug C du jour</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#1a3a2e" />
<meta name="description" content="Un bug en C par jour. Trouve le fix. Garde la série." />

<!-- PWA -->
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/icon.svg" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Bugg" />
<meta name="mobile-web-app-capable" content="yes" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root { --bg: #fafaf7; --ink: #0f0f0d; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); overscroll-behavior: none; }
  body {
    font-family: -apple-system, "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  * { box-sizing: border-box; }
  #root { height: 100dvh; width: 100vw; overflow: hidden; position: relative; }
  .ios-scroll::-webkit-scrollbar { display: none; }
  .ios-scroll { scrollbar-width: none; }

  .loading, .errorbox {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--ink); font-family: "Instrument Serif", Georgia, serif;
    text-align: center; padding: 32px;
  }
  .errorbox button {
    margin-top: 18px; padding: 12px 22px; border-radius: 12px;
    background: var(--ink); color: #fff; border: none; font-size: 15px;
    font-family: inherit; cursor: pointer;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- API client (regular JS, no Babel) -->
<script src="bugg-api.js"></script>
</head>
<body>
<div id="root">
  <div class="loading">Chargement…</div>
</div>

<!-- App modules (order matters: bugs/shapes provide globals app.jsx needs) -->
<script type="text/babel" src="bugs.jsx"></script>
<script type="text/babel" src="shapes.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<!-- Mobile shell: single Hero variant + Bug suivant flow + service worker -->
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useCallback } = React;

const PALETTE = ["#ff5fa2","#1a3a2e","#7c3aed","#fcd34d","#fb923c","#3eea84","#5a0f1a","#ff00d4","#1e3a8a"];

function MobileRoot() {
  const api = useMemo(() => BuggAPI.create(), []);
  const [screen, setScreen] = useState("loading");
  const [bug, setBug] = useState(null);
  const [device, setDevice] = useState(null);
  const [resultData, setResultData] = useState(null);
  const [error, setError] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  // practiceMode is true once user clicks "Bug suivant" after the daily bug.
  // In that mode we cycle through the catalog (no XP, no streak impact).
  const [practiceMode, setPracticeMode] = useState(false);

  // ── Fetch a bug (daily by default, or next-after-id in practice mode) ───
  const load = useCallback(async (opts = {}) => {
    setScreen("loading"); setError(null);
    try {
      const data = await api.getBugOfTheDay(opts);
      setBug(data.bug);
      if (data.device) setDevice(data.device);
      // Persist last bug for offline fallback
      try { localStorage.setItem("bugg.lastBug", JSON.stringify(data)); } catch (_e) {}
      setScreen("home");
    } catch (e) {
      console.warn("API unreachable, trying local fallbacks", e);
      // 1. Use the cached last response (if any)
      try {
        const cached = JSON.parse(localStorage.getItem("bugg.lastBug") || "null");
        if (cached && cached.bug) {
          setBug(cached.bug);
          if (cached.device) setDevice(cached.device);
          setScreen("home");
          return;
        }
      } catch (_e) {}
      // 2. Local BUGS fallback (hardcoded in bugs.jsx)
      if (typeof BUGS !== "undefined" && BUGS.length) {
        setBug(BUGS[0]);
        setDevice({ streak: 0, best_streak: 0, total_xp: 0, bugs_solved: 0, already_solved_today: false });
        setScreen("home");
      } else {
        setError(e);
        setScreen("error");
      }
    }
  }, [api]);

  useEffect(() => { load(); }, [load]);

  // ── Actions ───────────────────────────────────────────────────
  function start() { setScreen("challenge"); }
  function back()  { setScreen("home"); }

  async function submit({ draft }) {
    if (submitting) return;
    setSubmitting(true);
    try {
      const r = await api.submit(bug.id, draft);
      setResultData({ draft, correct: r.correct, answer: r.answer, explanation: r.explanation, xp_awarded: r.xp_awarded });
      if (r.device) setDevice(r.device);
      setScreen("result");
    } catch (e) {
      // offline: best-effort local check if regex is available
      const correct = Array.isArray(bug.accept) ? bug.accept.some(re => re.test(draft)) : false;
      setResultData({
        draft, correct,
        answer: bug.answer || "",
        explanation: bug.explanation || "Le serveur est injoignable — fix vérifié localement.",
        xp_awarded: correct ? (bug.xp || 0) : 0,
      });
      setScreen("result");
    } finally {
      setSubmitting(false);
    }
  }

  // After result → continue to next bug. If correct on the daily, fetch the new daily.
  // Otherwise (or once user opted in for practice), cycle through the catalog.
  function next() {
    if (!practiceMode) {
      load();
    } else {
      load({ afterId: bug?.id });
    }
  }
  function startPractice() {
    setPracticeMode(true);
    load({ afterId: bug?.id });
  }

  // ── Render ────────────────────────────────────────────────────
  if (screen === "error") {
    return (
      <div className="errorbox">
        <div style={{ fontSize: 36, lineHeight: 1, marginBottom: 8 }}>Bugg</div>
        <div style={{ fontFamily: "Inter, sans-serif", fontSize: 14, color: "rgba(0,0,0,0.55)" }}>
          Impossible de charger le bug du jour. Vérifie ta connexion.
        </div>
        <button onClick={() => load()}>Réessayer</button>
      </div>
    );
  }
  if (screen === "loading" || !bug) {
    return <div className="loading">Chargement du bug du jour…</div>;
  }

  if (screen === "challenge") {
    return <ChallengeScreen bug={bug} palette={PALETTE} speed={1} onSubmit={submit} onBack={back} />;
  }

  if (screen === "result") {
    return (
      <ResultScreenLive
        bug={bug}
        result={resultData}
        device={device}
        palette={PALETTE}
        practiceMode={practiceMode}
        onContinue={next}
        onStartPractice={startPractice}
        onBack={() => setScreen("home")}
      />
    );
  }

  // Home — only Hero variant
  const streak = device?.streak ?? 0;
  return <HomeHero streak={streak} bug={bug} speed={1} palette={PALETTE} onStart={start} />;
}

// ── Result screen with practice-mode CTA ──────────────────────────────
function ResultScreenLive({ bug, result, device, palette, practiceMode, onContinue, onStartPractice, onBack }) {
  const { correct, draft, answer, explanation, xp_awarded } = result;
  // Render the existing ResultScreen for the visual treatment, then layer extra CTAs over its button area.
  // We hide the default button by overlaying our own at the same position.
  return (
    <div style={{ position: "absolute", inset: 0 }}>
      <ResultScreen
        bug={bug}
        correct={correct}
        draft={draft}
        answer={answer}
        explanation={explanation}
        xp_awarded={xp_awarded}
        palette={palette}
        speed={1}
        onContinue={onContinue}
      />
      {/* Practice-mode hint shown only when correct + daily bug not yet in practice mode */}
      {correct && !practiceMode && !device?.already_solved_today && (
        <div style={{
          position: "absolute", left: 16, right: 16, bottom: 130, zIndex: 6,
          background: "rgba(255,255,255,0.7)", backdropFilter: "blur(6px)",
          borderRadius: 14, padding: "10px 14px",
          fontSize: 13, color: "rgba(0,0,0,0.7)", textAlign: "center", lineHeight: 1.4,
          border: "0.5px solid rgba(0,0,0,0.06)",
        }}>
          🔥 Bug du jour réussi !
        </div>
      )}
      {/* Secondary CTA: practice another bug */}
      {correct && (
        <div style={{
          position: "absolute", left: 16, right: 16, bottom: 14, zIndex: 6,
          display: "flex", justifyContent: "center",
        }}>
          {practiceMode ? (
            <button onClick={onBack} style={{
              background: "transparent", border: "none", color: "rgba(0,0,0,0.55)",
              fontSize: 13, fontWeight: 600, padding: "6px 12px", cursor: "pointer",
            }}>
              Terminer pour aujourd'hui
            </button>
          ) : (
            <button onClick={onStartPractice} style={{
              background: "transparent", border: "none", color: "rgba(0,0,0,0.55)",
              fontSize: 13, fontWeight: 600, padding: "6px 12px", cursor: "pointer",
            }}>
              Continuer à pratiquer →
            </button>
          )}
        </div>
      )}
    </div>
  );
}

window.__renderBuggMobile = () => {
  ReactDOM.createRoot(document.getElementById("root")).render(<MobileRoot />);
};

// Wait until app.jsx loaded all globals before mounting
function whenReady(fn) {
  if (window.HomeHero && window.ChallengeScreen && window.ResultScreen) {
    fn();
  } else {
    setTimeout(() => whenReady(fn), 50);
  }
}
whenReady(window.__renderBuggMobile);

// ── Register service worker for offline / installable PWA ───────────
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch((e) => console.warn("SW register failed", e));
  });
}
</script>
</body>
</html>

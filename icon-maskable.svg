<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Maskable version: full-bleed background, content within the safe zone (centered 80% — Android masks the outer 10%). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd1e0"/>
      <stop offset="1" stop-color="#fef9ee"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

  <!-- Inside the 80% safe zone (x 102 to 922) -->
  <!-- Antennae -->
  <path d="M 440 280 q -10 -70 -52 -88" stroke="#1a3a2e" stroke-width="20" stroke-linecap="round" fill="none"/>
  <path d="M 584 280 q 10 -70 52 -88" stroke="#1a3a2e" stroke-width="20" stroke-linecap="round" fill="none"/>
  <circle cx="388" cy="192" r="22" fill="#fcd34d" stroke="#1a3a2e" stroke-width="9"/>
  <circle cx="636" cy="192" r="22" fill="#fcd34d" stroke="#1a3a2e" stroke-width="9"/>

  <!-- Body -->
  <ellipse cx="512" cy="560" rx="270" ry="250" fill="#ff5fa2"/>
  <path d="M 512 320 V 800" stroke="#1a3a2e" stroke-width="12" stroke-linecap="round"/>

  <!-- Spots -->
  <circle cx="400" cy="450" r="32" fill="#1a3a2e"/>
  <circle cx="372" cy="570" r="38" fill="#1a3a2e"/>
  <circle cx="420" cy="680" r="28" fill="#1a3a2e"/>
  <circle cx="624" cy="470" r="30" fill="#1a3a2e"/>
  <circle cx="668" cy="580" r="36" fill="#1a3a2e"/>
  <circle cx="608" cy="680" r="32" fill="#1a3a2e"/>

  <!-- Head -->
  <path d="M 320 390 a 192 142 0 0 1 384 0 z" fill="#1a3a2e"/>

  <!-- Eyes -->
  <ellipse cx="448" cy="340" rx="30" ry="36" fill="#ffffff"/>
  <ellipse cx="576" cy="340" rx="30" ry="36" fill="#ffffff"/>
  <circle cx="456" cy="346" r="14" fill="#0f0f0d"/>
  <circle cx="584" cy="346" r="14" fill="#0f0f0d"/>
  <circle cx="462" cy="338" r="5" fill="#ffffff"/>
  <circle cx="590" cy="338" r="5" fill="#ffffff"/>

  <!-- Smile -->
  <path d="M 476 400 q 36 26 72 0" stroke="#0f0f0d" stroke-width="12" stroke-linecap="round" fill="none"/>
</svg>
